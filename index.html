<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuevavilla</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            color: white;
            text-align: center;
        }

        header {
            padding: 50px 20px;
        }

        h1 {
            font-size: 3em;
            margin: 0;
        }

        p {
            font-size: 1.2em;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: white;
            color: #333;
            text-decoration: none;
            border-radius: 25px;
            font-weight: bold;
        }

        .btn:hover {
            background: #ddd;
        }

        footer {
            margin-top: 50px;
            padding: 20px;
            font-size: 0.9em;
        }
    </style>
</head>

<body>

<header>
    <h1>Welcome to Nuevavilla</h1>
    <p>Your website is live on GitHub Pages 🚀</p>
    <a href="#" class="btn">Get Started</a>
</header>

<footer>
    <p>© 2026 Nuevavilla. All rights reserved.</p>
</footer>

</body>
</html>
